<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion AI Recommendation Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Fashion Recommendation Platform</h1>
            <p>Get personalized fashion advice powered by AI</p>
        </header>

        <main>
            <div class="upload-section">
                <h2>Upload Your Outfit</h2>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept="image/*" hidden>
                    <div class="upload-content">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                            <polyline points="14,2 14,8 20,8"/>
                        </svg>
                        <p>Click to upload or drag and drop your outfit image</p>
                    </div>
                </div>
                <button id="analyzeBtn" class="btn primary" disabled>Analyze Outfit</button>
            </div>

            <div class="preferences-section">
                <h2>Or Describe Your Preferences</h2>
                <textarea id="preferencesText" placeholder="Describe your style preferences, occasion, colors you like, etc."></textarea>
                <button id="textRecommendBtn" class="btn secondary">Get Recommendations</button>
            </div>

            <div class="results-section" id="resultsSection" hidden>
                <h2>AI Recommendations</h2>
                <div id="resultsContent"></div>
            </div>
        </main>

        <footer>
            <p>Powered by Gemini AI, FastAPI, and modern web technologies</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
